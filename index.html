<script>
// ===== SCRIPT UNIFICADO - CATALOGO PRO =====

const TIENDA_CONFIG_OBJ = typeof TIENDA_CONFIG !== 'undefined' ? TIENDA_CONFIG : {};

let PRODUCTOS = [];
let CATEGORIA_ACTIVA = 'all';

// Mapa de data-filter a texto de categoría en JSON
const FILTRO_MAP = {
  'all': null,
  'moda': 'Moda Urbana',
  'oferta': 'Belleza y Salud',
  'tech': 'Tecnologia Inteligente',
  'hogar': 'Hogar Premium',
  'espiritualidad': 'Espiritualidad y Bienestar',
  'instalacion': 'Instalcion y Servicios',
  'compraventa': 'Compra y Venta'
};

// ---- CARGA DE PRODUCTOS ----
fetch('products.json')
  .then(r => r.json())
  .then(data => {
    PRODUCTOS = data.filter(p => p.Activo === 'SI');
    renderProducts(PRODUCTOS);
  })
  .catch(err => {
    console.error('Error cargando products.json:', err);
    document.getElementById('productsGrid').innerHTML =
      '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">No se pudieron cargar los productos. Abre el HTML desde un servidor local.</p>';
  });

// ---- OBTENER IMÁGENES ----
function obtenerImagenes(product) {
  return [
    product.Foto1_Tienda, product.Foto2_Tienda,
    product.Foto3_Tienda, product.Foto4_Tienda,
    product.Foto5_Tienda, product.Foto6_Tienda,
    product.Foto7_Tienda, product.Foto8_Tienda
  ].filter(img => img && img.trim() !== '');
}

// ---- RENDER PRODUCTOS ----
function renderProducts(lista) {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;

  if (!lista || lista.length === 0) {
    grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:40px;color:#999;">No hay productos en esta categoría.</p>';
    return;
  }

  lista = [...lista].sort((a,b) => {
    const da = a.Destacado === 'SI' ? 0 : 1;
    const db = b.Destacado === 'SI' ? 0 : 1;
    return da - db;
  });
  grid.innerHTML = lista.map(product => {
    const fotos = obtenerImagenes(product);
    const precio = Number(product.Precio || 0).toLocaleString('es-CO');
    const precioAntes = Number(product.Precio_Antes || 0);
    const descuento = Number(product.Descuento || 0);
    const tel = TIENDA_CONFIG_OBJ.whatsapp || '573000000000';
    const catNombre = FILTRO_MAP[CATEGORIA_ACTIVA] || product.Categoria || 'la tienda';
    const msgWa = encodeURIComponent('Hola, vi el producto ' + product.Nombre + ' de la categoría ' + catNombre + ' y quiero pedirlo. Precio: $' + Number(product.Precio).toLocaleString('es-CO'));
    return `
      <div class="product-card" onclick="openModal('${product.SKU}')" style="${product.Destacado === 'SI' ? 'border:1.5px solid #C9922A;' : ''}">
        <div class="product-image-wrapper">
          <img
            src="${fotos[0] || 'https://via.placeholder.com/500'}"
            class="product-image"
            loading="lazy"
            onload="this.classList.add('img-loaded');this.parentElement.classList.add('loaded')"
            onerror="this.src='https://via.placeholder.com/500';this.classList.add('img-loaded');this.parentElement.classList.add('loaded')"
          >
          ${descuento > 0 ? `<span style="position:absolute;top:10px;left:10px;background:#e91e63;color:white;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;z-index:2;">-${descuento}%</span>` : ''}
          ${product.Destacado === 'SI' ? `<span style="position:absolute;top:10px;right:10px;background:#C9922A;color:#1a1208;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;z-index:2;">⭐ Top</span>` : ''}
        </div>
        <div class="product-info">
          <h3 class="product-title">${product.Nombre || ''}</h3>
          <div class="product-price-section">
            <span class="price-current">$${precio}</span>
            ${precioAntes > 0 ? `<span class="price-old">$${precioAntes.toLocaleString('es-CO')}</span>` : ''}
          </div>
          ${precioAntes > 0 ? `<div style="display:inline-flex;align-items:center;gap:4px;margin-top:5px;background:#e8f5e9;padding:3px 8px;border-radius:20px;"><i class="fas fa-tag" style="font-size:11px;color:#2e7d32;"></i><span style="font-size:11px;font-weight:700;color:#1b5e20;">Ahorras $${Math.abs(precioAntes - Number(product.Precio)).toLocaleString('es-CO')}</span></div>` : ''}
          <a href="https://wa.me/${tel}?text=${msgWa}" target="_blank"
            onclick="event.stopPropagation()"
            style="margin-top:12px;width:100%;background:#25D366;color:white;border:none;padding:12px;border-radius:50px;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;font-size:0.9rem;box-sizing:border-box;">
            <i class="fab fa-whatsapp"></i> Pedir por WhatsApp
          </a>
        </div>
      </div>
    `;
  }).join('');
}

// ---- FILTROS DE CATEGORÍA ----

    ];
    socialLinks.forEach(function(s) {
      if (!s.url) return;
      const a = document.createElement('a');
      a.href = s.url; a.target = '_blank'; a.title = s.label;
      a.style.cssText = 'text-decoration:none;display:flex;align-items:center;transition:transform 0.2s;';
      a.innerHTML = s.svg;
      a.addEventListener('mouseenter', function(){ this.style.transform='scale(1.18)'; });
      a.addEventListener('mouseleave', function(){ this.style.transform='scale(1)'; });
      socialsHeader.appendChild(a);
    });
  }

  // WhatsApp flotante
  const wa = document.getElementById('whatsappFloat');
  if (wa && C.whatsapp) {
    wa.href = `https://wa.me/${C.whatsapp}?text=${encodeURIComponent(C.mensajeWhatsApp || 'Hola')}`;

  if (C.colorPrincipal) document.documentElement.style.setProperty('--color-primary', C.colorPrincipal);

          <p style="font-size:10px;color:rgba(255,255,255,0.25);margin:0;">&copy; ${new Date().getFullYear()} ${C.nombre || 'Tienda'}. Todos los derechos reservados.</p>
        </div>
      </div>
    `;
  }
});

// ---- APLICAR FILTROS (categoría + búsqueda) ----
function aplicarFiltros() {
  const busqueda = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
  const categoriaNombre = FILTRO_MAP[CATEGORIA_ACTIVA];

  let resultado = PRODUCTOS;

  if (categoriaNombre) {
    resultado = resultado.filter(p =>
      p.Categoria && p.Categoria.toLowerCase().includes(categoriaNombre.toLowerCase())
    );
  }

  if (busqueda) {
    resultado = resultado.filter(p =>
      (p.Nombre || '').toLowerCase().includes(busqueda) ||
      (p.Marca || '').toLowerCase().includes(busqueda) ||
      (p.Categoria || '').toLowerCase().includes(busqueda)
    );
  }

  renderProducts(resultado);
}

function searchProducts() {
  aplicarFiltros();
}

// ---- MODAL ----
let PRODUCTO_ACTIVO = null;
let IMAGENES_ACTIVAS = [];

  if (!product) return;

  PRODUCTO_ACTIVO = product;
  IMAGENES_ACTIVAS = obtenerImagenes(product);

        `<span style="font-size:11px;color:#888;margin-left:auto;display:flex;align-items:center;gap:4px;"><i class="fas fa-eye" style="font-size:11px;"></i> ${(function(){var d=new Date();var s=d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();return 18+(s%33);})() } hoy</span>` +
      `</div>` +
      (product.Descripcion ? `<p style="font-size:0.88rem;color:#555;line-height:1.5;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #f0f0f0;">${product.Descripcion}</p>` : '') +
      `<div style="font-size:0.85rem;color:#555;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:6px;">` +
        (product.Estado ? `<span style="background:#f5f5f5;padding:3px 10px;border-radius:20px;"><b>Estado:</b> ${product.Estado}</span>` : '') +

        (product.YouTube && product.YouTube.trim() && product.YouTube.trim() !== 'NO APLICA' ?
          `<a href="${product.YouTube}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;background:#fff0f0;padding:3px 10px;border-radius:20px;text-decoration:none;color:#FF0000;font-weight:600;">` +

window.addEventListener('load', function() {
  var el = document.getElementById('filterChips');
  if (!el) return;
  var paused = false;
  var raf;
  function step() {
    if (!paused) {
      el.scrollLeft += 0.6;
      if (el.scrollLeft >= el.scrollWidth - el.clientWidth) {
        el.scrollLeft = 0;
      }
    }
    raf = requestAnimationFrame(step);
  }
  raf = requestAnimationFrame(step);
  el.addEventListener('click', function() {
    paused = true;
    cancelAnimationFrame(raf);
  }, { once: true });
  el.addEventListener('touchstart', function() {
    paused = true;
    cancelAnimationFrame(raf);
  }, { once: true });
});
</script>

  html+='<hr class="wc-divider"><div class="wc-slabel">Faltan d\u00edas para...</div>';
  html+='<div class="wc-counts">';
  var proximos=celebraciones.map(function(c){var fd=new Date(anio,c.m-1,c.d);var diff=Math.ceil((fd-hoyTs)/864e5);if(diff<=0){fd=new Date(anio+1,c.m-1,c.d);diff=Math.ceil((fd-hoyTs)/864e5);}return Object.assign({},c,{faltan:diff});}).sort(function(a,b){return a.faltan-b.faltan;}).slice(0,3);
  proximos.forEach(function(p){html+='<div class="wc-count"><span class="wc-count-n">'+p.faltan+'</span><span class="wc-count-l">d\u00edas para<br>'+p.t.split(' ').slice(0,3).join(' ')+'</span></div>';});
  var dFin=Math.ceil((new Date(anio,11,31)-hoyTs)/864e5);
  html+='<div class="wc-count"><span class="wc-count-n">'+dFin+'</span><span class="wc-count-l">d\u00edas para<br>Fin de a\u00f1o</span></div>';
  html+='</div>';
  document.getElementById('wc-inner').innerHTML=html;
  // Abrir la tarjeta con animacion
  setTimeout(function(){

  function wcCerrar(){

    setTimeout(function(){cierre.classList.remove('show');},4000);

<div class="gs-cart-overlay" id="gs-cart-overlay" onclick="gsCartToggle()"></div>
<div id="gs-cart-panel">
  <div class="gs-cart-handle"></div>
  <div class="gs-cart-title">
    <i class="ti ti-shopping-cart" aria-hidden="true"></i>
    Tu pedido
  </div>
  <div id="gs-cart-body">
    <div class="gs-cart-empty">Agrega productos para ver tu pedido</div>
  </div>
</div>

<script>
var gsCart = [];

function fmtCOP(n) { return '$' + Math.round(n).toLocaleString('es-CO'); }

window.gsCartAdd = function(p) {
  if (!p) return;
  gsCart.push({ name: p.Nombre, price: Number(p.Precio) });
  gsCartRender();
};

window.gsCartRemove = function(i) {
  gsCart.splice(i, 1);
  gsCartRender();
};

window.gsCartToggle = function() {
  var panel = document.getElementById('gs-cart-panel');
  var overlay = document.getElementById('gs-cart-overlay');
  panel.classList.toggle('open');
  overlay.classList.toggle('show');
};

function gsCartRender() {
  var badge = document.getElementById('gs-cart-badge');
  if (gsCart.length > 0) {
    badge.textContent = gsCart.length;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }

  var body = document.getElementById('gs-cart-body');
  if (gsCart.length === 0) {
    body.innerHTML = '<div class="gs-cart-empty">Agrega productos para ver tu pedido</div>';
    return;
  }

  var total = gsCart.reduce(function(s, it) { return s + it.price; }, 0);
  var html = '';
  gsCart.forEach(function(it, i) {
    html += '<div class="gs-cart-item">' +
      '<span class="gs-cart-item-name">' + it.name + '</span>' +
      '<span style="display:flex;align-items:center;gap:8px;">' +
        '<span class="gs-cart-item-price">' + fmtCOP(it.price) + '</span>' +
        '<button class="gs-cart-item-rm" onclick="gsCartRemove(' + i + ')" aria-label="Eliminar">&#10005;</button>' +
      '</span>' +
    '</div>';
  });

  html += '<div class="gs-cart-total-row">' +
    '<span class="gs-cart-total-label">Subtotal (' + gsCart.length + ' productos)</span>' +
    '<span class="gs-cart-total-val">' + fmtCOP(total) + '</span>' +
  '</div>';
  html += '<div class="gs-cart-envio">+ Costo de env\u00edo a coordinar</div>';
  html += '<button class="gs-cart-wa" onclick="gsCartWA()">' +
    '<i class="ti ti-brand-whatsapp" aria-hidden="true"></i> Pedir por WhatsApp' +
  '</button>';

  body.innerHTML = html;
}

window.gsCartWA = function() {
  var C = window.TIENDA_CONFIG_OBJ || {};
  var tel = C.whatsapp || '573000000000';
  var total = gsCart.reduce(function(s,it){return s+it.price;},0);
  var lineas = gsCart.map(function(it){ return '- ' + it.name + ' ' + fmtCOP(it.price); }).join('\n');
  var msg = 'Hola, quiero consultar un pedido:\n' + lineas + '\nSubtotal: ' + fmtCOP(total) + '\n(+ env\u00edo a coordinar)';
  window.open('https://wa.me/' + tel + '?text=' + encodeURIComponent(msg), '_blank');
};
</script>
